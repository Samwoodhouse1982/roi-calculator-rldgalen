<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHR Migration & Archiving — ROI Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    /* Embed/responsive build: html/body fill the host viewport (or iframe),
       and the React app's outer container handles the max-width centering.
       Removed the kiosk's hardcoded 1080×1920 from html, body, #root.
       Removed user-scalable=no from viewport so people can pinch-zoom if
       they want to inspect a tile up close on mobile. */
    /* Light web theme — RLDatix web-calculator design system (deep teal +
       seafoam on white), matching the Smart Match web build. */
    html, body { margin: 0; padding: 0; width: 100%; min-height: 100vh; -webkit-font-smoothing: antialiased; background: #EEF7F2; font-family: 'DM Sans', sans-serif; }
    #root { width: 100%; min-height: 100vh; }
    input[type=range] { -webkit-appearance: none; height: 12px; border-radius: 6px; background: #D4E0DD; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 30px; height: 30px; border-radius: 50%; background: #0F4146; cursor: pointer; border: 3px solid #fff; box-shadow: 0 2px 10px rgba(15,65,70,0.35); }
    input[type=range]::-moz-range-thumb { width: 30px; height: 30px; border-radius: 50%; background: #0F4146; cursor: pointer; border: 3px solid #fff; }
    select { background: #fff; color: #0F4146; border-color: #D4E0DD; }
    input[type=number] { background: #fff; color: #0F4146; border-color: #D4E0DD; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #EEF7F2; }
    ::-webkit-scrollbar-thumb { background: #C2D4D0; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root">
    <div id="js-fallback" style="color:#3D5A5E;text-align:center;padding:120px 32px;font-family:DM Sans,sans-serif;font-size:16px;">
      <div style="font-size:24px;font-weight:700;color:#0F4146;margin-bottom:16px;">Loading calculator...</div>
      <div>This calculator needs JavaScript. If this message persists, please contact your RLDatix representative.</div>
    </div>
  </div>
  <script>window.onerror=function(m,s,l,c,e){document.getElementById('js-fallback').innerHTML='<div style="color:#e74c3c;font-size:20px;font-weight:700;">JavaScript Error</div><div style="margin-top:12px;color:#8494a8;">'+m+'</div><div style="margin-top:8px;font-size:13px;color:#607080;">'+s+' line '+l+'</div>';}</script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
